server {
    listen 80;
    listen [::]:80;
    server_name ha.blackridge.shumie.net dns.blackridge.shumie.net dsm.blackridge.shumie.net \
                printer.blackridge.shumie.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name ha.blackridge.shumie.net;

    ssl_certificate /etc/letsencrypt/live/ha.blackridge.shumie.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ha.blackridge.shumie.net/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name dns.blackridge.shumie.net;

    ssl_certificate /etc/letsencrypt/live/ha.blackridge.shumie.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ha.blackridge.shumie.net/privkey.pem;

    location / {
        proxy_pass http://192.168.10.10:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name dsm.blackridge.shumie.net;

    ssl_certificate /etc/letsencrypt/live/ha.blackridge.shumie.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ha.blackridge.shumie.net/privkey.pem;

    location / {
        proxy_pass https://192.168.10.20:5001;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name printer.blackridge.shumie.net;

    ssl_certificate /etc/letsencrypt/live/ha.blackridge.shumie.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ha.blackridge.shumie.net/privkey.pem;

    location = /webApps/TheatreHome/TheatreHome.htf {
        default_type text/html;
        alias /run/nginx/fallback/TheatreHome/TheatreHome.htf;
    }

    location = /webApps/TheatreHome/TheatreHome.js {
        default_type application/javascript;
        alias /run/nginx/fallback/TheatreHome/TheatreHome.js;
    }

    location = /webApps/TheatreHome/TheatreHome.css {
        default_type text/css;
        alias /run/nginx/fallback/TheatreHome/TheatreHome.css;
    }

    location / {
        proxy_pass https://192.168.40.10:443;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2;
        proxy_ssl_ciphers 'DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-SHA256:DHE-RSA-AES256-SHA:AES256-GCM-SHA384:AES256-SHA256:AES256-SHA:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:AES128-GCM-SHA256:AES128-SHA256:AES128-SHA';
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.40.10;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
