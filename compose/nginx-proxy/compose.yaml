services:
  nginx:
    image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: nginx-proxy
    restart: unless-stopped
    env_file:
      - .env.nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./fallback:/run/nginx/fallback:ro
      - ./auth:/run/nginx/auth:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  certbot:
    image: certbot/dns-route53@sha256:4f8e07e6d3451cfe592602a090e2c1cc29ddcdefac157093c226d07e657fc1b0
    container_name: nginx-certbot
    profiles:
      - certbot
    env_file:
      - .env.nginx-proxy
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-work:/var/lib/letsencrypt
      - certbot-log:/var/log/letsencrypt
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/renew.sh"]
    networks:
      - proxy

volumes:
  letsencrypt:
  certbot-work:
  certbot-log:

networks:
  proxy:
    external: true
